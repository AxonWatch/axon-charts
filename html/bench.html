<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Axon Charts - Performance Benchmarks</title>
<script src="https://unpkg.com/axon-charts/dist/chart.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0d0d; color: #ccc; font-family: system-ui, -apple-system, sans-serif; padding: 32px; }
  h1 { font-size: 20px; color: #fff; margin-bottom: 4px; }
  h1 span { color: #4ade80; }
  .sub { color: #666; font-size: 13px; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 16px; }
  .card h3 { font-size: 13px; color: #888; margin-bottom: 8px; }
  .card .val { font-size: 28px; font-weight: 700; color: #4ade80; }
  #chart-wrap { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
  #chart-wrap .hdr { padding: 12px 16px; border-bottom: 1px solid #2a2a2a; font-size: 13px; color: #aaa; display: flex; justify-content: space-between; }
  #chart-wrap .hdr .status { color: #facc15; font-size: 11px; }
  #chart { width: 100%; height: 400px; position: relative; }
  pre { background: #111; border: 1px solid #2a2a2a; border-radius: 8px; padding: 16px; font-size: 13px; line-height: 1.7; overflow-x: auto; }
</style>
</head>
<body>
<h1><span>Axon</span> Charts &mdash; Benchmarks</h1>
<p class="sub">Rigorous browser measurements. All tests use <code>performance.now()</code>. Stream test simulates real 100Hz ticks.</p>

<div class="grid" id="stats"></div>

<div id="chart-wrap">
  <div class="hdr">
    <span>Benchmark Chart (10000 bars, candlestick + volume)</span>
    <span class="status" id="stream-status">idle</span>
  </div>
  <div id="chart"></div>
</div>

<pre id="log"></pre>

<script>
var log = [];
function l(t) { log.push(t); }
function render() { document.getElementById('log').textContent = log.join('\n'); }

function genData(bars, base, vol) {
  var d = [], t = 1704067200000, p = base || 100, v = vol || 2.5;
  for (var i = 0; i < bars; i++) {
    var ch = (Math.random() - 0.48) * v;
    d.push({ time: t, open: +p.toFixed(2), high: +(p + Math.abs(ch) + Math.random() * v * 0.3).toFixed(2), low: +(p - Math.abs(ch) - Math.random() * v * 0.3).toFixed(2), close: +(p + ch).toFixed(2), volume: Math.round(Math.random() * 5000 + 1000) });
    p += ch; t += 60000;
  }
  return d;
}

var streamSamples = [];

function run() {
  var data = genData(10000);

  // 1. First Render (10000 bars, candlestick + volume)
  var t0 = performance.now();
  var chart = AxonCharts.createChart('#chart', {
    layout: { background: '#1a1a1a', textColor: '#ffffff', fontSize: 11 },
    grid: { vertLines: { color: '#2a2a2a' }, horzLines: { color: '#2a2a2a' } },
    volume: { show: true, heightPercent: 0.2 },
    timeScale: { barSpacing: 5 }
  });
  var t1 = performance.now();
  chart.setData(data);
  var t2 = performance.now();
  var firstRenderTotal = (t2 - t0).toFixed(2);
  l('1. First render (10000 bars, candlestick + volume)');
  l('   createChart: ' + (t1 - t0).toFixed(2) + 'ms  setData: ' + (t2 - t1).toFixed(2) + 'ms  total: ' + firstRenderTotal + 'ms');
  l('');

  // 2. Tight-loop updateLastBarFast (1000 iterations)
  var tick = JSON.parse(JSON.stringify(data[data.length - 1]));
  var samples = [];
  for (var i = 0; i < 1000; i++) {
    tick.close += (Math.random() - 0.5) * 0.2;
    tick.high = Math.max(tick.high, tick.close);
    tick.low = Math.min(tick.low, tick.close);
    var tt0 = performance.now();
    chart.updateLastBarFast(tick);
    samples.push(performance.now() - tt0);
  }
  samples.sort(function(a,b){return a-b;});
  var avg = samples.reduce(function(s,v){return s+v;},0) / samples.length;
  var median = samples[Math.floor(samples.length/2)];
  var p99 = samples[Math.floor(samples.length * 0.99)];
  var tightAvg = avg.toFixed(3);
  l('2. Tight-loop updateLastBarFast (1000 ticks):');
  l('   avg=' + tightAvg + 'ms  median=' + median.toFixed(3) + 'ms  p99=' + p99.toFixed(3) + 'ms');
  l('');

  // 3. Full updateLastBar (200 ticks)
  samples = [];
  for (i = 0; i < 200; i++) {
    tick.close += (Math.random() - 0.5) * 0.4;
    tick.high = Math.max(tick.high, tick.close);
    tick.low = Math.min(tick.low, tick.close);
    var tt0 = performance.now();
    chart.updateLastBar(tick);
    samples.push(performance.now() - tt0);
  }
  samples.sort(function(a,b){return a-b;});
  avg = samples.reduce(function(s,v){return s+v;},0) / samples.length;
  median = samples[Math.floor(samples.length/2)];
  p99 = samples[Math.floor(samples.length * 0.99)];
  l('3. updateLastBar (200 ticks, full render):');
  l('   avg=' + avg.toFixed(3) + 'ms  median=' + median.toFixed(3) + 'ms  p99=' + p99.toFixed(3) + 'ms');
  l('');

  // 4. Async streaming (500 ticks at 10ms = 100Hz)
  l('4. Async streaming test (500 ticks at 10ms intervals = 100Hz):');
  l('');
  document.getElementById('stream-status').textContent = 'streaming...';

  var streamTicks = [];
  var currentPrice = data[data.length - 1].close;
  var lastBar = JSON.parse(JSON.stringify(data[data.length - 1]));

  for (var si = 0; si < 500; si++) {
    var change = (Math.random() - 0.5) * 0.3;
    currentPrice += change;
    lastBar.close = +currentPrice.toFixed(2);
    lastBar.high = Math.max(lastBar.high, lastBar.close);
    lastBar.low = Math.min(lastBar.low, lastBar.close);
    lastBar.volume = (lastBar.volume || 0) + Math.round(Math.random() * 100);
    streamTicks.push(JSON.parse(JSON.stringify(lastBar)));
  }

  streamSamples = [];
  var streamIndex = 0;
  var streamTimer = setInterval(function() {
    if (streamIndex >= streamTicks.length) {
      clearInterval(streamTimer);
      streamSamples.sort(function(a,b){return a-b;});
      var sAvg = streamSamples.reduce(function(s,v){return s+v;},0) / streamSamples.length;
      var sMedian = streamSamples[Math.floor(streamSamples.length/2)];
      var sP99 = streamSamples[Math.floor(streamSamples.length * 0.99)];
      l('   async avg=' + sAvg.toFixed(4) + 'ms  median=' + sMedian.toFixed(4) + 'ms  p99=' + sP99.toFixed(4) + 'ms');
      l('   min=' + streamSamples[0].toFixed(4) + 'ms  max=' + streamSamples[streamSamples.length-1].toFixed(4) + 'ms');
      l('');
      document.getElementById('stream-status').textContent = 'done';
      afterStream(chart, firstRenderTotal, tightAvg);
      return;
    }
    var st0 = performance.now();
    chart.updateLastBarFast(streamTicks[streamIndex]);
    streamSamples.push(performance.now() - st0);
    streamIndex++;
  }, 10);
}

function afterStream(chart, firstRenderTime, tightAvg) {
  var samples, i, avg, median, p99;

  // 5. Crosshair draw (50 samples)
  samples = [];
  for (i = 0; i < 50; i++) {
    var ct0 = performance.now();
    chart.crosshair['draw']();
    samples.push(performance.now() - ct0);
  }
  samples.sort(function(a,b){return a-b;});
  avg = samples.reduce(function(s,v){return s+v;},0) / samples.length;
  median = samples[Math.floor(samples.length/2)];
  p99 = samples[Math.floor(samples.length * 0.99)];
  l('5. Crosshair draw (50 samples):');
  l('   avg=' + avg.toFixed(3) + 'ms  median=' + median.toFixed(3) + 'ms  p99=' + p99.toFixed(3) + 'ms');
  l('');

  // 6. Large dataset (10000 bars) + memory
  var data10000 = genData(10000);
  var mem0 = performance.memory ? performance.memory.usedJSHeapSize : 0;
  var c2 = document.createElement('div');
  c2.id = 'chart2';
  c2.style.cssText = 'width:900px;height:400px;position:relative;';
  document.body.appendChild(c2);
  var ct1 = performance.now();
  var chart2 = AxonCharts.createChart('#chart2', { layout: { background: '#1a1a1a', textColor: '#ffffff' } });
  chart2.setData(data10000);
  var ct2 = performance.now();
  var mem1 = performance.memory ? performance.memory.usedJSHeapSize : 0;
  l('6. Large dataset (10000 bars):');
  l('   render: ' + (ct2 - ct1).toFixed(2) + 'ms');
  if (mem1 > 0) {
    l('   memory: ~' + ((mem1 - mem0) / 1024 / 1024).toFixed(1) + 'MB heap delta');
  } else {
    l('   memory: not measured (open in Chrome for heap data)');
  }
  chart2.destroy();
  document.body.removeChild(c2);
  l('');

  // 7. Series types (1000 bars each, 5 types)
  var types = ['line', 'area', 'bar', 'heiken-ashi', 'hollow'];
  var data1000 = genData(1000);
  l('7. Series type render comparison (1000 bars each, 5 types):');
  for (var ti = 0; ti < types.length; ti++) {
    var t = types[ti];
    var c3 = document.createElement('div');
    document.body.appendChild(c3);
    var st0 = performance.now();
    var ch3 = AxonCharts.createChart(c3, {
      layout: { width: 200, height: 100, background: '#1a1a1a', textColor: '#ffffff' },
      grid: { show: false },
      series: { type: t },
      timeScale: { barSpacing: 3 }
    });
    ch3.setData(data1000);
    l('   ' + (t + ':').padEnd(14) + (performance.now() - st0).toFixed(2) + 'ms');
    ch3.destroy();
    document.body.removeChild(c3);
  }

  render();

  // Stats cards with real results
  var asyncAvg = streamSamples.length > 0 ? (streamSamples.reduce(function(s,v){return s+v;},0) / streamSamples.length).toFixed(3) : '?';
  document.getElementById('stats').innerHTML =
    '<div class="card"><h3>First Render (10000 bars)</h3><div class="val">' + firstRenderTime + 'ms</div></div>' +
    '<div class="card"><h3>Live Tick (tight loop)</h3><div class="val">~' + tightAvg + 'ms</div></div>' +
    '<div class="card"><h3>Live Tick (async 100Hz)</h3><div class="val">~' + asyncAvg + 'ms</div></div>' +
    '<div class="card"><h3>Bundle Size</h3><div class="val">25.4KB</div></div>';
}

setTimeout(run, 200);
</script>
</body>
</html>
